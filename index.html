<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Proxy Panel</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font (Lobster + Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f0f3, #d9d9e0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .glass-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 70px 70px 40px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255,255,255,0.7);
            padding: 35px 30px 45px;
            transition: all 0.2s;
            position: relative;
        }
        /* ---------- LOGIN OVERLAY (ابتدا نمایش) ---------- */
        #loginOverlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 30px 20px 40px;
            width: 100%;
        }
        #loginOverlay .gold-title {
            font-family: 'Lobster', cursive;
            font-size: 4.8rem;
            background: linear-gradient(135deg, #d4af37, #f9d976, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(212,175,55,0.3);
            animation: shimmer 3s infinite alternate;
            letter-spacing: 2px;
        }
        @keyframes shimmer {
            0% { filter: drop-shadow(0 0 8px rgba(212,175,55,0.2)); }
            100% { filter: drop-shadow(0 0 30px rgba(212,175,55,0.6)); }
        }
        #loginOverlay .sub-id {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e1e1e;
            background: rgba(255,215,0,0.15);
            padding: 6px 35px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212,175,55,0.3);
            margin-top: -16px;
            letter-spacing: 1px;
        }
        #loginOverlay .sub-id i {
            color: #d4af37;
            margin-right: 12px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(14px);
            border-radius: 90px;
            padding: 22px 35px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 18px 25px;
            margin-top: 10px;
            border: 1px solid rgba(255,215,0,0.25);
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 700px;
        }
        .login-box input {
            background: rgba(255,255,255,0.7);
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1rem;
            outline: 1px solid rgba(0,0,0,0.04);
            backdrop-filter: blur(4px);
            min-width: 170px;
            transition: 0.2s;
            font-weight: 500;
            flex: 1;
        }
        .login-box input:focus {
            outline: 2px solid #d4af37;
            background: white;
        }
        .login-box button {
            background: linear-gradient(135deg, #d4af37, #f5d371);
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 700;
            color: #1e1e1e;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(212,175,55,0.3);
            transition: 0.2s;
            border: 1px solid rgba(255,255,200,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .login-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 14px 32px rgba(212,175,55,0.5);
        }
        .login-error {
            color: #b22222;
            font-weight: 600;
            background: rgba(255,0,0,0.08);
            padding: 8px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-size: 0.95rem;
            border: 1px solid rgba(255,0,0,0.1);
            display: none;
        }
        .login-success {
            color: #1f6d2b;
            font-weight: 600;
            background: rgba(46,125,50,0.08);
            padding: 8px 24px;
            border-radius: 60px;
            display: none;
            border: 1px solid rgba(46,125,50,0.15);
        }
        /* ---------- محتوای اصلی (پس از لاگین) ---------- */
        #mainContent {
            display: none;
            flex-direction: column;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .header .gold-title {
            font-family: 'Lobster', cursive;
            font-size: 4.2rem;
            background: linear-gradient(135deg, #d4af37, #f9d976, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(212,175,55,0.3);
            animation: shimmer 3s infinite alternate;
        }
        .header .sub-id {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e1e1e;
            background: rgba(255,215,0,0.12);
            padding: 4px 28px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212,175,55,0.25);
            margin-top: -12px;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
            background: rgba(255,255,240,0.25);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 14px 20px;
            margin: 12px 0 25px;
            border: 1px solid rgba(255,215,0,0.15);
            box-shadow: 0 6px 18px rgba(0,0,0,0.03);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a1a;
            background: rgba(255,255,255,0.35);
            padding: 6px 20px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
        .stat-item i { color: #d4af37; font-size: 1.3rem; }
        .stat-number {
            background: #1e1e1e;
            color: #f5e7b0;
            padding: 0 14px;
            border-radius: 40px;
            font-weight: 700;
            min-width: 32px;
            text-align: center;
        }
        /* Proxy grid */
        .proxy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin: 10px 0 25px;
        }
        .proxy-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            padding: 16px 14px 16px 18px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }
        .proxy-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: #d4af37;
            box-shadow: 0 18px 35px rgba(212,175,55,0.12);
            background: rgba(255, 255, 255, 0.6);
        }
        .proxy-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1e1e1e;
            background: rgba(255,215,0,0.08);
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
            width: fit-content;
            letter-spacing: 0.3px;
            border: 1px solid rgba(212,175,55,0.1);
        }
        .proxy-name i { color: #d4af37; margin-right: 6px; }
        .btn-copy {
            background: rgba(30, 30, 30, 0.04);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 8px 10px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #1e1e1e;
            width: 100%;
        }
        .btn-copy i { color: #d4af37; }
        .btn-copy:hover {
            background: #d4af37;
            color: #1e1e1e;
            border-color: #d4af37;
            box-shadow: 0 6px 16px rgba(212,175,55,0.25);
        }
        .btn-copy.copied {
            background: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        .btn-copy.copied i { color: white; }
        .user-list-section {
            margin-top: 20px;
            background: rgba(255,255,240,0.2);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 18px 22px;
            border: 1px solid rgba(212,175,55,0.1);
        }
        .user-list-title {
            font-weight: 700;
            color: #1e1e1e;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .user-list-title i { color: #d4af37; }
        #userListContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            font-size: 0.9rem;
        }
        .user-badge {
            background: rgba(255,255,255,0.5);
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(212,175,55,0.15);
        }
        @media (max-width: 650px) {
            .gold-title { font-size: 3rem; }
            .sub-id { font-size: 1.2rem; }
            .login-box { border-radius: 40px; padding: 18px; }
            .proxy-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="glass-container" id="appContainer">
    <!-- ========== LOGIN OVERLAY ========== -->
    <div id="loginOverlay">
        <div class="gold-title">✨ Gold Proxy</div>
        <div class="sub-id"><i class="fas fa-crown"></i> @Gold_Proxy_Official</div>
        <div class="login-box" id="loginPanel">
            <input type="text" id="usernameInput" placeholder="یوزرنیم (انگلیسی)" autofocus>
            <input type="password" id="passwordInput" placeholder="رمز پنل">
            <button id="loginBtn"><i class="fas fa-key"></i> ورود</button>
            <span id="loginError" class="login-error">رمز اشتباه است</span>
            <span id="loginSuccess" class="login-success"><i class="fas fa-check-circle"></i> وارد شدید</span>
        </div>
    </div>

    <!-- ========== MAIN CONTENT (بعد از لاگین) ========== -->
    <div id="mainContent">
        <div class="header">
            <div class="gold-title">✨ Gold Proxy</div>
            <div class="sub-id"><i class="fas fa-crown"></i> @Gold_Proxy_Official</div>
        </div>

        <div class="stats-row">
            <div class="stat-item"><i class="fas fa-server"></i> تعداد پروکسی : <span class="stat-number" id="totalProxies">0</span></div>
            <div class="stat-item"><i class="fas fa-copy"></i> کپی شده : <span class="stat-number" id="copiedCount">0</span></div>
            <div class="stat-item"><i class="fas fa-users"></i> وارد شده : <span class="stat-number" id="userCount">0</span></div>
        </div>

        <div id="proxyGrid" class="proxy-grid"></div>

        <div class="user-list-section">
            <div class="user-list-title"><i class="fas fa-address-book"></i> لیست کاربران وارد شده</div>
            <div id="userListContainer"><span style="opacity:0.6;">هنوز کسی وارد نشده</span></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ============ لیست پروکسی‌ها (۲۹ عدد) ============
        const proxyLinks = [
            "https://t.me/proxy?server=noron.talebi.co.uk&port=2096&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=lux.lavazemi1.co.uk&port=2096&secret=ee1603010200010001fc030386e24c3add7777772e7961686f6f2e636f6d",

            "https://t.me/proxy?server=bia.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=goat.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=khob.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=messi.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "tg://proxy?server=messi2.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "tg://proxy?server=bad.nisti.co.uk&port=8880&secret=EERighJJvXrFGRMCIMJdCQ==",
            "https://t.me/proxy?server=bia.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=goat.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=khob.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=messi.nisti.co.uk&port=8880&secret=eeNEgYdJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=cloud.click-master.co.uk&port=8443&secret=EERighJJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=dark.basicscotch.co.uk&port=22&secret=ee1603010200010001fc030386e24c3add6d656469612e737465616d706f77657265642e636f6d",
            "https://t.me/proxy?server=blond.basicscotch.co.uk&port=25565&secret=ee1603010200010001fc030386e24c3add6d656469612e737465616d706f77657265642e636f6d",
            "https://t.me/proxy?server=b.sub-ploter.co.uk&port=22&secret=ee1603010200010001fc030386e24c3add6d656469612e737465616d706f77657265642e636f6d",
            "https://t.me/proxy?server=beer.crona-extra.co.uk&port=8443&secret=EERighJJvXrFGRMCIMJdCQ",
            "https://t.me/proxy?server=super.sub-ploter.co.uk&port=25565&secret=ee1603010200010001fc030386e24c3add6d656469612e737465616d706f77657265642e636f6d",
            "https://t.me/proxy?server=PAyDaR.goooalir.co.uk&port=8443&secret=dd104462821249bd7ac519130220c25d09",
            "https://t.me/proxy?server=nab.goooalir.co.uk&port=8443&secret=dd104462821249bd7ac519130220c25d09",
            "https://t.me/proxy?server=tassian.goooalir.co.uk&port=8443&secret=dd104462821249bd7ac519130220c25d09"
        ];

        // ============ STATE ============
        let users = [];              // اسامی کاربران وارد شده
        let copiedCount = 0;         // تعداد کل کپی‌ها (persist via localStorage)
        let isLoggedIn = false;
        let currentUser = '';

        // ============ DOM ============
        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const grid = document.getElementById('proxyGrid');
        const totalSpan = document.getElementById('totalProxies');
        const copiedSpan = document.getElementById('copiedCount');
        const userCountSpan = document.getElementById('userCount');
        const userListContainer = document.getElementById('userListContainer');

        // ============ LOAD PERSISTENT DATA ============
        function loadPersistent() {
            const saved = localStorage.getItem('goldProxyData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.copiedCount !== undefined) copiedCount = data.copiedCount;
                    if (data.users) users = data.users;
                } catch(e) {}
            }
            // همیشه آمار را آپدیت کن
            updateStats();
        }
        function savePersistent() {
            const data = { copiedCount, users };
            localStorage.setItem('goldProxyData', JSON.stringify(data));
        }

        // ============ UPDATE UI ============
        function updateStats() {
            totalSpan.textContent = proxyLinks.length;
            copiedSpan.textContent = copiedCount;
            userCountSpan.textContent = users.length;
            if (users.length === 0) {
                userListContainer.innerHTML = '<span style="opacity:0.6;">هنوز کسی وارد نشده</span>';
            } else {
                userListContainer.innerHTML = users.map(u => `<span class="user-badge"><i class="fas fa-user"></i> ${u}</span>`).join(' ');
            }
            savePersistent();
        }

        // ============ RENDER PROXIES ============
        function renderProxies() {
            grid.innerHTML = '';
            proxyLinks.forEach((link, index) => {
                const card = document.createElement('div');
                card.className = 'proxy-card';

                // استخراج نام سرور برای نمایش
                let serverName = 'proxy';
                try {
                    const url = new URL(link);
                    const s = url.searchParams.get('server');
                    if (s) serverName = s;
                } catch (e) { /* ignore */ }

                const nameDiv = document.createElement('div');
                nameDiv.className = 'proxy-name';
                nameDiv.innerHTML = `<i class="fas fa-link"></i> ${serverName}`;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn-copy';
                copyBtn.innerHTML = `<i class="fas fa-copy"></i> کپی`;
                copyBtn.setAttribute('data-link', link);

                copyBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const linkText = this.getAttribute('data-link');
                    navigator.clipboard.writeText(linkText).then(() => {
                        copiedCount += 1;
                        updateStats();
                        this.classList.add('copied');
                        this.innerHTML = `<i class="fas fa-check"></i> کپی شد`;
                        setTimeout(() => {
                            this.classList.remove('copied');
                            this.innerHTML = `<i class="fas fa-copy"></i> کپی`;
                        }, 2000);
                    }).catch(() => {
                        alert('خطا در کپی، لطفاً دستی کپی کنید');
                    });
                });

                card.appendChild(nameDiv);
                card.appendChild(copyBtn);
                grid.appendChild(card);
            });
        }

        // ============ LOGIN LOGIC ============
        function attemptLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // بررسی یوزرنیم (انگلیسی)
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                loginError.style.display = 'block';
                loginError.textContent = 'یوزرنیم باید انگلیسی باشد';
                loginSuccess.style.display = 'none';
                return;
            }
            if (password !== 'Gold-Proxy-Official') {
                loginError.style.display = 'block';
                loginError.textContent = 'رمز اشتباه است';
                loginSuccess.style.display = 'none';
                return;
            }

            // موفق
            loginError.style.display = 'none';
            loginSuccess.style.display = 'block';
            loginSuccess.innerHTML = `<i class="fas fa-check-circle"></i> خوش آمدید ${username}`;
            isLoggedIn = true;
            currentUser = username;

            // اضافه کردن کاربر (اگر نبود)
            if (!users.includes(username)) {
                users.push(username);
                updateStats();
            }

            // ذخیره لاگین در localStorage
            localStorage.setItem('goldProxyLoggedIn', 'true');
            localStorage.setItem('goldProxyUser', username);

            // نمایش محتوای اصلی و مخفی کردن لاگین
            loginOverlay.style.display = 'none';
            mainContent.style.display = 'flex';

            // (اختیاری) غیرفعال کردن لاگین
            usernameInput.disabled = true;
            passwordInput.disabled = true;
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.6';
        }

        // ============ AUTO-LOGIN CHECK ============
        function checkAutoLogin() {
            const logged = localStorage.getItem('goldProxyLoggedIn');
            const user = localStorage.getItem('goldProxyUser');
            if (logged === 'true' && user) {
                // اگر کاربر قبلا لاگین کرده بود، مستقیماً وارد شو
                currentUser = user;
                if (!users.includes(user)) {
                    users.push(user);
                }
                isLoggedIn = true;
                loginOverlay.style.display = 'none';
                mainContent.style.display = 'flex';
                // غیرفعال کردن فیلدهای لاگین (دیگه لازم نیست)
                usernameInput.disabled = true;
                passwordInput.disabled = true;
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.6';
                loginSuccess.style.display = 'block';
                loginSuccess.innerHTML = `<i class="fas fa-check-circle"></i> خوش آمدید ${user}`;
                updateStats();
                renderProxies();
            } else {
                // نمایش لاگین
                loginOverlay.style.display = 'flex';
                mainContent.style.display = 'none';
                renderProxies();
                updateStats();
            }
        }

        // ============ INIT ============
        function init() {
            loadPersistent();          // بارگذاری copiedCount و users
            renderProxies();
            updateStats();
            // بررسی auto-login
            checkAutoLogin();

            // event listeners
            loginBtn.addEventListener('click', attemptLogin);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (document.activeElement === usernameInput || document.activeElement === passwordInput) {
                        attemptLogin();
                    }
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
